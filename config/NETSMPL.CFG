# Sprinter RTL8019AS network kit configuration template.
# Copy this file to NET.CFG on the DSS volume and edit values for your
# local IPv4 network. Do not commit a real NET.CFG to the repository.
#
# Lines starting with # are comments. Unknown keys are ignored.
# Keys are case-sensitive.

# ----------------------------------------------------------------------
# Hardware
# ----------------------------------------------------------------------
# RTL_IOBASE: I/O base of the RTL8019AS card. ISA8 jumper-selectable;
# MAME currently exposes 0x300, 0x320, 0x340, 0x360.
RTL_IOBASE=0x300

# RTL_IRQ: IRQ line. Polling driver does not use this yet, but utilities
# may print/verify it. Supported in MAME: 2/9, 3, 4, 5.
RTL_IRQ=3

# RTL_MAC: optional override of the PROM MAC. Format: aa:bb:cc:dd:ee:ff.
# Leave empty to use the MAC programmed into PROM/9346 EEPROM.
RTL_MAC=

# ----------------------------------------------------------------------
# IPv4 (no DHCP yet — all values are static)
# ----------------------------------------------------------------------
IP=192.168.7.2
NETMASK=255.255.255.0
GATEWAY=192.168.7.1

# ----------------------------------------------------------------------
# DNS (used only when the resolver stage is implemented)
# ----------------------------------------------------------------------
DNS1=1.1.1.1
DNS2=8.8.8.8

# ----------------------------------------------------------------------
# Time / NTP
# ----------------------------------------------------------------------
# TZ: time zone offset from UTC, signed integer hours.
TZ=+3

# NTP: default NTP server for ntp.exe.
NTP=pool.ntp.org
