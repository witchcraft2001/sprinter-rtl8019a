# Sprinter RTL8019AS network kit configuration template.
# Copy to NET.CFG on the DSS volume and edit the values.
# Lines starting with # are comments. Unknown keys ignored.

# Hardware: ISA slot + I/O base in one line, "S/N":
#   S = 0 (ISA0) or 1 (ISA1)
#   N = hex I/O base in 0x200..0x3E0 step 0x20.
# Optional "#" or "0x"/"0X" prefix on N; comment-out (or omit)
# to let the driver auto-scan both slots and pick the first
# responder.  When auto-scan succeeds the canonical "S/#HHH"
# is written back to the env so subsequent utilities skip it.
RTL_HW=1/#300

# Hardware IRQ (parsed but not yet applied; driver polls).
RTL_IRQ=3

# Optional MAC override. Empty = built-in default 02:80:19:11:22:33.
RTL_MAC=

# IPv4 address.  Either a dotted-decimal literal (static config)
# or the keyword DHCP to acquire a lease via IFUP at boot.
#
# Static example:
IP=192.168.7.2
NETMASK=255.255.255.0
GATEWAY=192.168.7.1
#
# DHCP example (IFUP fills NET_IP / NET_MASK / NET_GW / NET_DNS*
# from the DHCP server; NETMASK/GATEWAY/DNS lines below are
# ignored when IP=DHCP):
# IP=DHCP

# DNS (used when resolver stage is implemented).
DNS1=1.1.1.1
DNS2=8.8.8.8

# Time / NTP.
TZ=+3
NTP=pool.ntp.org
